name: Build & Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: Win64
          - os: macos-latest
            target: Mac
          - os: macos-latest
            target: iOS
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          target: ${{ matrix.target }}
          combine: true

      - uses: actions/upload-artifact@v4
        with:
          name: VerifierLabels-${{ matrix.target }}
          path: ${{ steps.build.outputs.build-output }}

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: geode-sdk/build-geode-mod/combine@main
        id: combine

      - uses: actions/upload-artifact@v4
        with:
          name: VerifierLabels
          path: ${{ steps.combine.outputs.build-output }}

  release:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: VerifierLabels
          path: release

      - uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.geode
          generate_release_notes: true

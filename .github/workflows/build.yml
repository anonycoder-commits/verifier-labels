name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: Win64
          - name: macOS
            os: macos-latest
            target: MacOS
          - name: iOS
            os: macos-latest
            target: iOS

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          combine: true
          target: ${{ matrix.config.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: VerifierLabels-${{ matrix.config.name }}
          path: ${{ steps.build.outputs.build-output }}

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: geode-sdk/build-geode-mod/combine@main
        id: combine

      - uses: actions/upload-artifact@v4
        with:
          name: VerifierLabels
          path: ${{ steps.combine.outputs.build-output }}

  release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: VerifierLabels
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/**/*.geode
          generate_release_notes: true